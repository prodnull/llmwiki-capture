name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check capture/ tests/

      - name: Format check
        run: ruff format --check capture/ tests/

      - name: Type check
        run: mypy capture/ --ignore-missing-imports

      - name: Test
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t llmwiki-capture:test .

      - name: Verify image runs
        run: |
          docker run -d --name capture-test \
            -e CAPTURE_TOKEN=ci-test-token \
            -e WIKI_PATH=/wiki \
            -p 7199:7199 \
            llmwiki-capture:test
          sleep 2
          curl -sf http://localhost:7199/health | python3 -m json.tool
          docker stop capture-test
